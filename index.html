<style>
  :root{
    --ivory:#F7F3EC;
    --ivory-deep:#EFE9DC;
    --charcoal:#1C1A17;
    --gold:#A8843D;
    --gold-soft:#C7A668;
    --bordeaux:#5C1A1A;
    --marble-green:#3A4A40;
    --line:#D9D4C8;
    --white-marble:#FCFAF6;
  }
  *{box-sizing:border-box;}
  html,body{margin:0;padding:0;}
  body{
    background:var(--ivory);
    background-image:
      radial-gradient(ellipse at 10% 0%, rgba(168,132,61,0.06), transparent 45%),
      radial-gradient(ellipse at 90% 100%, rgba(92,26,26,0.04), transparent 45%);
    color:var(--charcoal);
    font-family:'Outfit',sans-serif;
    -webkit-font-smoothing:antialiased;
    min-height:100vh;
  }
  .serif{font-family:'Cormorant Garamond',serif;}
  .smallcaps{font-family:'Spectral SC',serif;}

  /* ===== Header ===== */
  header{
    padding:48px 24px 32px;
    text-align:center;
    position:relative;
  }
  .eyebrow{
    font-family:'Spectral SC',serif;
    font-size:11px;
    letter-spacing:0.28em;
    text-transform:uppercase;
    color:var(--gold);
    margin-bottom:14px;
  }

  /* ===== Tabs ===== */
  .tabs{
    display:flex;
    justify-content:center;
    gap:0;
    margin-top:30px;
  }
  .tab{
    font-family:'Spectral SC',serif;
    font-size:11.5px;
    letter-spacing:0.14em;
    text-transform:uppercase;
    padding:13px 26px;
    cursor:pointer;
    background:none;
    border:none;
    color:var(--gold-soft);
    position:relative;
    transition:color .25s;
  }
  .tab:not(:last-child)::after{
    content:'';
    position:absolute;
    right:0;top:50%;
    transform:translateY(-50%);
    width:1px;height:14px;
    background:var(--line);
  }
  .tab.active{
    color:var(--gold);
  }
  .tab.active::before{
    content:'';
    position:absolute;
    bottom:-1px;left:50%;
    transform:translateX(-50%);
    width:60%;height:2px;
    background:var(--gold);
  }
  .tab-anniversary{
    text-align:center;
    font-size:10px;
    color:#a39a89;
    letter-spacing:0.06em;
    margin-top:6px;
    font-style:italic;
    font-family:'Cormorant Garamond',serif;
  }
  .names{
    font-family:'Cormorant Garamond',serif;
    font-style:italic;
    font-weight:500;
    font-size:clamp(32px,7vw,52px);
    margin:0;
    line-height:1.1;
    letter-spacing:0.01em;
    color:var(--gold);
  }
  .names .amp{
    color:var(--gold);
    margin:0 10px;
    font-style:normal;
  }
  .subdate{
    margin-top:10px;
    font-size:13px;
    letter-spacing:0.08em;
    color:#6b6357;
    text-transform:uppercase;
  }

  /* Wax seal countdown */
  .seal-wrap{
    display:flex;
    justify-content:center;
    margin-top:28px;
    filter:drop-shadow(0 10px 16px rgba(92,20,20,0.3));
  }
  .seal{
    width:128px;height:128px;
    position:relative;
    display:flex;
    flex-direction:column;
    align-items:center;
    justify-content:center;
    color:#3a0d0d;
  }
  .seal-blob{
    position:absolute;
    inset:0;
    background:
      radial-gradient(circle at 30% 22%, #e0bc72 0%, var(--gold) 32%, #8a6a2c 68%, #6e4e1e 100%);
    border-radius:42% 58% 53% 47% / 55% 45% 58% 42%;
  }
  .seal-blob::before{
    content:'';
    position:absolute;
    inset:-4%;
    background:inherit;
    border-radius:58% 42% 47% 53% / 45% 55% 42% 58%;
    opacity:0.55;
    z-index:-1;
    transform:rotate(18deg);
  }
  .seal-blob::after{
    content:'';
    position:absolute;
    inset:-3%;
    background:inherit;
    border-radius:46% 54% 60% 40% / 60% 40% 54% 46%;
    opacity:0.4;
    z-index:-2;
    transform:rotate(-22deg);
  }
  .seal-inner{
    position:absolute;
    inset:14%;
    border-radius:50%;
    background:radial-gradient(circle at 35% 30%, #c79a4f, var(--gold) 60%, #74591f 100%);
    box-shadow:
      inset 0 3px 6px rgba(255,255,255,0.25),
      inset 0 -8px 12px rgba(0,0,0,0.3),
      0 0 0 1px rgba(255,255,255,0.08);
    display:flex;
    flex-direction:column;
    align-items:center;
    justify-content:center;
  }
  .seal-inner::before{
    content:'';
    position:absolute;
    inset:9%;
    border-radius:50%;
    border:1px solid rgba(255,255,255,0.22);
  }
  .seal .num{
    font-family:'Cormorant Garamond',serif;
    font-weight:600;
    font-size:30px;
    line-height:1;
    color:#2b1f0c;
    text-shadow:0 1px 1px rgba(255,255,255,0.2);
    z-index:1;
  }
  .seal .lbl{
    font-family:'Spectral SC',serif;
    font-size:8.5px;
    letter-spacing:0.05em;
    text-transform:uppercase;
    margin-top:2px;
    text-align:center;
    padding:0 14px;
    color:#3a2c12;
    z-index:1;
  }

  /* ===== Financial ledger strip ===== */
  .ledger{
    max-width:920px;
    margin:36px auto 0;
    padding:0 20px;
  }
  .ledger-inner{
    background:var(--white-marble);
    border:1px solid var(--line);
    border-radius:2px;
    display:grid;
    grid-template-columns:1fr 1fr 1fr;
    position:relative;
    overflow:hidden;
  }
  .ledger-inner::before{
    content:'';
    position:absolute;
    top:0;left:0;right:0;height:3px;
    background:linear-gradient(90deg, var(--gold-soft), var(--gold), var(--gold-soft));
  }
  .ledger-cell{
    padding:22px 18px;
    text-align:center;
    border-right:1px solid var(--line);
  }
  .ledger-cell:last-child{border-right:none;}
  .ledger-cell .l-label{
    font-family:'Spectral SC',serif;
    font-size:10px;
    letter-spacing:0.18em;
    text-transform:uppercase;
    color:#897f6c;
  }
  .ledger-cell .l-value{
    font-family:'Outfit',sans-serif;
    font-weight:500;
    font-size:clamp(20px,4vw,28px);
    margin-top:8px;
    font-variant-numeric:tabular-nums;
  }
  .ledger-cell.paid .l-value{color:var(--marble-green);}
  .ledger-cell.pending .l-value{color:var(--bordeaux);}

  /* ===== Chapters (categories) ===== */
  .chapters{
    max-width:920px;
    margin:40px auto 100px;
    padding:0 20px;
  }
  .chapter{
    margin-bottom:14px;
    border:1px solid var(--line);
    background:var(--white-marble);
    border-radius:2px;
  }
  .chapter-head{
    display:flex;
    align-items:center;
    gap:18px;
    padding:20px 22px;
    cursor:pointer;
    user-select:none;
  }
  .chapter-num{
    font-family:'Cormorant Garamond',serif;
    font-style:italic;
    font-size:22px;
    color:var(--gold);
    width:34px;
    flex-shrink:0;
  }
  .chapter-title{
    flex:1;
  }
  .chapter-title h3{
    font-family:'Cormorant Garamond',serif;
    font-weight:600;
    font-size:21px;
    margin:0;
  }
  .chapter-meta{
    font-size:12px;
    color:#8a8170;
    margin-top:2px;
  }
  .chapter-amount{
    font-size:15px;
    font-weight:500;
    font-variant-numeric:tabular-nums;
    color:var(--charcoal);
    text-align:right;
    min-width:90px;
  }
  .chevron{
    width:10px;height:10px;
    border-right:1.5px solid var(--gold);
    border-bottom:1.5px solid var(--gold);
    transform:rotate(45deg);
    transition:transform .25s ease;
    flex-shrink:0;
  }
  .chapter.open .chevron{transform:rotate(-135deg);}

  .chapter-body{
    max-height:0;
    overflow:hidden;
    transition:max-height .35s ease;
  }
  .chapter.open .chapter-body{
    max-height:3000px;
  }
  .items{
    padding:0 22px 20px;
    border-top:1px solid var(--line);
  }
  .item{
    display:grid;
    grid-template-columns:1fr auto;
    gap:6px 14px;
    padding:18px 0;
    border-bottom:1px solid var(--line);
  }
  .item:last-child{border-bottom:none;}
  .item-name{
    font-weight:500;
    font-size:15.5px;
  }
  .item-status{
    font-family:'Spectral SC',serif;
    font-size:9.5px;
    letter-spacing:0.1em;
    text-transform:uppercase;
    padding:3px 9px;
    border-radius:20px;
    justify-self:end;
    height:fit-content;
  }
  .status-pago{background:rgba(58,74,64,0.12);color:var(--marble-green);}
  .status-parcial{background:rgba(168,132,61,0.14);color:var(--gold);}
  .status-pendente{background:rgba(92,26,26,0.1);color:var(--bordeaux);}

  .item-details{
    grid-column:1/-1;
    display:flex;
    flex-wrap:wrap;
    gap:16px 22px;
    font-size:12.5px;
    color:#787064;
    margin-top:2px;
  }
  .item-details .val{
    font-weight:500;
    color:var(--charcoal);
    font-variant-numeric:tabular-nums;
  }
  .item-link{
    color:var(--gold);
    text-decoration:none;
    border-bottom:1px solid rgba(168,132,61,0.4);
  }
  .item-note{
    grid-column:1/-1;
    font-size:13px;
    color:#5f574a;
    font-style:italic;
    margin-top:2px;
  }

  .item-actions{
    grid-column:1/-1;
    display:flex;
    gap:14px;
    margin-top:8px;
  }
  .icon-btn{
    background:none;
    border:none;
    font-family:'Outfit',sans-serif;
    font-size:11.5px;
    letter-spacing:0.03em;
    color:var(--gold);
    cursor:pointer;
    padding:2px 0;
    text-decoration:underline;
    text-decoration-color:rgba(168,132,61,0.35);
  }
  .icon-btn.danger{
    color:var(--bordeaux);
    text-decoration-color:rgba(92,26,26,0.3);
  }
  .icon-btn:hover{opacity:0.7;}

  .add-row{
    margin-top:14px;
    text-align:center;
  }
  .add-btn{
    background:none;
    border:1px solid var(--gold-soft);
    color:var(--gold);
    font-family:'Outfit',sans-serif;
    font-size:12.5px;
    letter-spacing:0.04em;
    padding:9px 18px;
    border-radius:30px;
    cursor:pointer;
    transition:all .2s;
  }
  .add-btn:hover{background:var(--gold);color:var(--white-marble);}

  footer{
    text-align:center;
    padding:30px 20px 60px;
    font-size:11.5px;
    letter-spacing:0.06em;
    color:#a39a89;
    text-transform:uppercase;
  }

  @media (max-width:560px){
    .ledger-inner{grid-template-columns:1fr;}
    .ledger-cell{border-right:none;border-bottom:1px solid var(--line);}
    .ledger-cell:last-child{border-bottom:none;}
    .chapter-amount{display:none;}
  }

  :focus-visible{outline:2px solid var(--gold);outline-offset:2px;}

  /* ===== Modal ===== */
  .modal-overlay{
    position:fixed;
    inset:0;
    background:rgba(28,26,23,0.55);
    backdrop-filter:blur(2px);
    display:none;
    align-items:center;
    justify-content:center;
    z-index:100;
    padding:20px;
  }
  .modal-overlay.open{display:flex;}
  .modal{
    background:var(--white-marble);
    border:1px solid var(--line);
    border-radius:3px;
    max-width:440px;
    width:100%;
    max-height:90vh;
    overflow-y:auto;
    position:relative;
    padding:32px 28px 26px;
  }
  .modal::before{
    content:'';
    position:absolute;
    top:0;left:0;right:0;height:3px;
    background:linear-gradient(90deg, var(--gold-soft), var(--gold), var(--gold-soft));
  }
  .modal h4{
    font-family:'Cormorant Garamond',serif;
    font-weight:600;
    font-size:22px;
    margin:0 0 4px;
  }
  .modal .modal-sub{
    font-size:12px;
    color:#8a8170;
    margin-bottom:22px;
  }
  .field{
    margin-bottom:16px;
  }
  .field label{
    display:block;
    font-family:'Spectral SC',serif;
    font-size:10px;
    letter-spacing:0.12em;
    text-transform:uppercase;
    color:#897f6c;
    margin-bottom:6px;
  }
  .field input, .field select, .field textarea{
    width:100%;
    border:1px solid var(--line);
    background:var(--ivory);
    border-radius:2px;
    padding:10px 12px;
    font-family:'Outfit',sans-serif;
    font-size:14px;
    color:var(--charcoal);
  }
  .field input:focus, .field select:focus, .field textarea:focus{
    outline:none;
    border-color:var(--gold-soft);
  }
  .field-row{
    display:grid;
    grid-template-columns:1fr 1fr;
    gap:14px;
  }
  .modal-actions{
    display:flex;
    gap:10px;
    margin-top:22px;
  }
  .btn-primary, .btn-secondary{
    flex:1;
    padding:12px;
    border-radius:30px;
    font-size:13px;
    letter-spacing:0.03em;
    cursor:pointer;
    border:1px solid var(--gold-soft);
    font-family:'Outfit',sans-serif;
  }
  .btn-primary{
    background:var(--gold);
    color:var(--white-marble);
    border-color:var(--gold);
  }
  .btn-primary:hover{background:#8f6f30;}
  .btn-secondary{
    background:none;
    color:var(--gold);
  }
  .btn-secondary:hover{background:rgba(168,132,61,0.08);}
  .modal-close{
    position:absolute;
    top:18px;right:18px;
    width:26px;height:26px;
    border:none;
    background:none;
    cursor:pointer;
    color:#a39a89;
    font-size:18px;
    line-height:1;
  }
</style>
</head>
<body>

<header>
  <div class="eyebrow">Atelier Nupcial</div>
  <h1 class="names">Paulo<span class="amp">&</span>Kelly</h1>
  <div class="subdate">Planejamento de Cerimônia &amp; Recepção</div>

  <div class="tabs">
    <button class="tab active" data-event="noivado" onclick="switchEvent('noivado')">Jantar de Noivado</button>
    <button class="tab" data-event="casamento" onclick="switchEvent('casamento')">Casamento</button>
  </div>
  <div class="tab-anniversary">15 jul 2026 — 15 jul 2027 · um ano de jornada entre os dois selos</div>

  <div class="seal-wrap">
    <div class="seal">
      <div class="seal-blob"></div>
      <div class="seal-inner">
        <div class="num" id="dayCount">--</div>
        <div class="lbl" id="dayLabel">dias até o<br>jantar de noivado</div>
      </div>
    </div>
  </div>
</header>

<section class="ledger">
  <div class="ledger-inner">
    <div class="ledger-cell">
      <div class="l-label">Orçado</div>
      <div class="l-value" id="totalBudget">R$ 0</div>
    </div>
    <div class="ledger-cell paid">
      <div class="l-label">Pago</div>
      <div class="l-value" id="totalPaid">R$ 0</div>
    </div>
    <div class="ledger-cell pending">
      <div class="l-label">Pendente</div>
      <div class="l-value" id="totalPending">R$ 0</div>
    </div>
  </div>
</section>

<section class="chapters" id="chaptersRoot"></section>

<footer>Atelier Nupcial — um livro de cerimônia digital</footer>

<div class="modal-overlay" id="modalOverlay">
  <div class="modal">
    <button class="modal-close" onclick="closeModal()">&times;</button>
    <h4 id="modalTitle">Adicionar item</h4>
    <div class="modal-sub" id="modalChapterName"></div>

    <div class="field">
      <label id="f-name-label">Descrição / Fornecedor</label>
      <input type="text" id="f-name" placeholder="Ex: Vinho tinto Reserva, ou Empresa Flora Decorações">
    </div>

    <div class="field-row">
      <div class="field">
        <label>Valor (R$)</label>
        <input type="text" id="f-value" inputmode="decimal" placeholder="0,00" oninput="maskCurrency(this)">
      </div>
      <div class="field">
        <label>Status</label>
        <select id="f-status">
          <option value="pendente">Pendente</option>
          <option value="parcial">Parcial</option>
          <option value="pago">Pago</option>
        </select>
      </div>
    </div>

    <div class="field-row">
      <div class="field">
        <label>Prazo</label>
        <input type="date" id="f-due">
      </div>
      <div class="field">
        <label>Link de referência</label>
        <input type="url" id="f-link" placeholder="https://...">
      </div>
    </div>

    <div class="field">
      <label>Observação (opcional)</label>
      <textarea id="f-note" rows="2" placeholder="Detalhes adicionais..."></textarea>
    </div>

    <div class="modal-actions">
      <button class="btn-secondary" onclick="closeModal()">Cancelar</button>
      <button class="btn-primary" onclick="saveItem()"><span id="saveBtnLabel">Salvar item</span></button>
    </div>
  </div>
</div>

<script>
const EVENTS = {
  noivado: {
    date: "2026-07-15T19:00:00",
    label: "dias até o<br>jantar de noivado",
    chapters: [
      { title: "Buffet", fieldLabel: "Descrição do prato/serviço", fieldPlaceholder: "Ex: Buffet completo, Estação de massas...", items: [] },
      { title: "Decoração", fieldLabel: "Empresa / fornecedor", fieldPlaceholder: "Ex: Flora Decorações", items: [] },
      { title: "Bolo / Bem-casados", fieldLabel: "Descrição", fieldPlaceholder: "Ex: Bolo 3 andares, Bem-casados de doce de leite...", items: [] },
      { title: "Bebidas", fieldLabel: "Qual bebida", fieldPlaceholder: "Ex: Vinho tinto Reserva, Espumante...", items: [] },
      { title: "Anel de Noivado", fieldLabel: "Descrição do anel", fieldPlaceholder: "Ex: Anel solitário ouro 18k", items: [] },
      { title: "Cobertura de Stories", fieldLabel: "Fornecedor / profissional", fieldPlaceholder: "Ex: João Stories Wedding", items: [] },
      { title: "Lembrancinha", fieldLabel: "Descrição da lembrancinha", fieldPlaceholder: "Ex: Mini vela personalizada", items: [] },
      { title: "Convites", fieldLabel: "Descrição / fornecedor", fieldPlaceholder: "Ex: Convite digital, Gráfica Lumière...", items: [] },
      { title: "Traje & Beleza", fieldLabel: "Descrição / fornecedor", fieldPlaceholder: "Ex: Terno Paulo, Maquiagem Kelly...", items: [] },
      { title: "Porta-retrato", fieldLabel: "Descrição", fieldPlaceholder: "Ex: Porta-retrato gravado personalizado", items: [] }
    ]
  },
  casamento: {
    date: "2027-07-15T19:00:00",
    label: "dias até o<br>casamento",
    chapters: [
      { title: "Local & Cerimônia", items: [] },
      { title: "Cerimonialista & Assessoria", items: [] },
      { title: "Buffet & Bebidas", items: [] },
      { title: "Decoração & Flores", items: [] },
      { title: "Fotografia & Vídeo", items: [] },
      { title: "Música & Entretenimento", items: [] },
      { title: "Convites & Papelaria", items: [] },
      { title: "Trajes & Beleza", items: [] },
      { title: "Lua de Mel", items: [] },
      { title: "Lembrancinhas & Extras", items: [] }
    ]
  }
};

let currentEvent = 'noivado';

function switchEvent(key){
  currentEvent = key;
  document.querySelectorAll('.tab').forEach(t => t.classList.toggle('active', t.dataset.event === key));
  updateCountdown();
  render();
}

function updateCountdown(){
  const now = new Date();
  const target = new Date(EVENTS[currentEvent].date);
  const diff = Math.ceil((target - now) / (1000*60*60*24));
  document.getElementById('dayCount').textContent = diff > 0 ? diff : '0';
  document.getElementById('dayLabel').innerHTML = EVENTS[currentEvent].label;
}

function fmt(n){
  return 'R$ ' + Number(n||0).toLocaleString('pt-BR', {minimumFractionDigits:2, maximumFractionDigits:2});
}

function maskCurrency(input){
  let digits = input.value.replace(/\D/g, '');
  if(!digits){ input.value = ''; return; }
  digits = digits.replace(/^0+(?=\d)/, '');
  while(digits.length < 3) digits = '0' + digits;
  const cents = digits.slice(-2);
  let intPart = digits.slice(0, -2);
  intPart = intPart.replace(/^0+(?=\d)/, '');
  intPart = intPart.replace(/\B(?=(\d{3})+(?!\d))/g, '.');
  input.value = intPart + ',' + cents;
}

function parseCurrency(str){
  if(!str) return 0;
  const cleaned = str.replace(/\./g, '').replace(',', '.');
  return parseFloat(cleaned) || 0;
}

const romanNumerals = ["I","II","III","IV","V","VI","VII","VIII","IX","X","XI","XII"];

function statusClass(s){
  if(s==="pago") return "status-pago";
  if(s==="parcial") return "status-parcial";
  return "status-pendente";
}
function statusLabel(s){
  if(s==="pago") return "Pago";
  if(s==="parcial") return "Parcial";
  return "Pendente";
}

function render(){
  const chapters = EVENTS[currentEvent].chapters;
  const root = document.getElementById('chaptersRoot');
  root.innerHTML = '';
  let totalBudget=0, totalPaid=0, totalPending=0;

  chapters.forEach((ch, ci) => {
    let chapterTotal = 0;
    ch.items.forEach(it=>{
      chapterTotal += Number(it.value||0);
      totalBudget += Number(it.value||0);
      if(it.status==='pago') totalPaid += Number(it.value||0);
      else if(it.status==='parcial'){ totalPaid += Number(it.value||0)/2; totalPending += Number(it.value||0)/2; }
      else totalPending += Number(it.value||0);
    });

    const div = document.createElement('div');
    div.className = 'chapter';
    div.innerHTML = `
      <div class="chapter-head" onclick="this.parentElement.classList.toggle('open')">
        <div class="chapter-num">${romanNumerals[ci] || ci+1}</div>
        <div class="chapter-title">
          <h3>${ch.title}</h3>
          <div class="chapter-meta">${ch.items.length} ${ch.items.length===1?'item':'itens'}</div>
        </div>
        <div class="chapter-amount">${fmt(chapterTotal)}</div>
        <div class="chevron"></div>
      </div>
      <div class="chapter-body">
        <div class="items">
          ${ch.items.map((it, ii) => `
            <div class="item">
              <div class="item-name">${it.name}</div>
              <div class="item-status ${statusClass(it.status)}">${statusLabel(it.status)}</div>
              <div class="item-details">
                <span>Valor: <span class="val">${fmt(it.value)}</span></span>
                ${it.due ? `<span>Prazo: <span class="val">${it.due}</span></span>` : ''}
                ${it.link ? `<a class="item-link" href="${it.link}" target="_blank" rel="noopener">Ver referência ↗</a>` : ''}
              </div>
              ${it.note ? `<div class="item-note">${it.note}</div>` : ''}
              <div class="item-actions">
                <button class="icon-btn" onclick="openModal(${ci}, ${ii})">Editar</button>
                <button class="icon-btn danger" onclick="deleteItem(${ci}, ${ii})">Excluir</button>
              </div>
            </div>
          `).join('') || '<p style="color:#a39a89;font-size:13px;padding:14px 0;">Nenhum item adicionado ainda.</p>'}
          <div class="add-row">
            <button class="add-btn" onclick="openModal(${ci})">+ Adicionar item</button>
          </div>
        </div>
      </div>
    `;
    root.appendChild(div);
  });

  document.getElementById('totalBudget').textContent = fmt(totalBudget);
  document.getElementById('totalPaid').textContent = fmt(totalPaid);
  document.getElementById('totalPending').textContent = fmt(totalPending);
}

updateCountdown();
render();
document.querySelector('.chapter')?.classList.add('open');

// ===== Modal logic =====
let activeChapterIndex = null;
let activeItemIndex = null; // null = criando novo; número = editando item existente

function openModal(chapterIndex, itemIndex){
  activeChapterIndex = chapterIndex;
  activeItemIndex = (itemIndex === undefined) ? null : itemIndex;
  const chapter = EVENTS[currentEvent].chapters[chapterIndex];
  document.getElementById('modalChapterName').textContent = chapter.title;
  document.getElementById('f-name-label').textContent = chapter.fieldLabel || 'Descrição / Fornecedor';
  document.getElementById('f-name').placeholder = chapter.fieldPlaceholder || 'Descreva o item';

  const isEditing = activeItemIndex !== null;
  document.getElementById('modalTitle').textContent = isEditing ? 'Editar item' : 'Adicionar item';
  document.getElementById('saveBtnLabel').textContent = isEditing ? 'Salvar alterações' : 'Salvar item';

  if(isEditing){
    const it = chapter.items[activeItemIndex];
    document.getElementById('f-name').value = it.name || '';
    document.getElementById('f-value').value = it.value ? it.value.toLocaleString('pt-BR', {minimumFractionDigits:2, maximumFractionDigits:2}) : '';
    document.getElementById('f-status').value = it.status || 'pendente';
    document.getElementById('f-due').value = it.dueISO || '';
    document.getElementById('f-link').value = it.link || '';
    document.getElementById('f-note').value = it.note || '';
  } else {
    document.getElementById('f-name').value = '';
    document.getElementById('f-value').value = '';
    document.getElementById('f-status').value = 'pendente';
    document.getElementById('f-due').value = '';
    document.getElementById('f-link').value = '';
    document.getElementById('f-note').value = '';
  }

  document.getElementById('modalOverlay').classList.add('open');
  setTimeout(()=>document.getElementById('f-name').focus(), 50);
}

function closeModal(){
  document.getElementById('modalOverlay').classList.remove('open');
}

function deleteItem(chapterIndex, itemIndex){
  if(!confirm('Tem certeza que deseja excluir este item?')) return;
  EVENTS[currentEvent].chapters[chapterIndex].items.splice(itemIndex, 1);
  render();
  document.querySelectorAll('.chapter')[chapterIndex]?.classList.add('open');
}

function saveItem(){
  const name = document.getElementById('f-name').value.trim();
  if(!name){
    document.getElementById('f-name').focus();
    return;
  }
  const value = parseCurrency(document.getElementById('f-value').value);
  const status = document.getElementById('f-status').value;
  const dueRaw = document.getElementById('f-due').value;
  const due = dueRaw ? new Date(dueRaw+'T00:00:00').toLocaleDateString('pt-BR') : '';
  const link = document.getElementById('f-link').value.trim();
  const note = document.getElementById('f-note').value.trim();

  const chapterIndex = activeChapterIndex;
  const newItem = { name, value, status, due, dueISO: dueRaw, link, note };

  if(activeItemIndex !== null){
    EVENTS[currentEvent].chapters[chapterIndex].items[activeItemIndex] = newItem;
  } else {
    EVENTS[currentEvent].chapters[chapterIndex].items.push(newItem);
  }

  closeModal();
  render();

  // mantém o capítulo recém-editado aberto
  document.querySelectorAll('.chapter')[chapterIndex]?.classList.add('open');
}

// Fecha modal clicando fora
document.getElementById('modalOverlay').addEventListener('click', function(e){
  if(e.target === this) closeModal();
});

</script>

</body>
</html>
